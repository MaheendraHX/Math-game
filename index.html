<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <style>
        /* Dark Red Backgrounds & White Text Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a0000;
            text-align: center;
            padding: 20px;
            color: #ffffff;
        }
        .card {
            background: #330000;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #550000;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
        }
        .question {
            font-size: 38px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffffff;
            background: #1a0000;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #cc0000;
        }
        button {
            background: #ffffff;
            color: #330000;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcccc;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
        #camera-wrapper {
            position: relative;
            width: 480px;
            height: 360px;
            margin: 20px auto;
            border-radius: 10px;
            border: 4px solid #cc0000;
            overflow: hidden;
            background: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 480px;
            height: 360px;
            transform: scaleX(-1);
        }
        #result-box {
            font-size: 20px;
            font-weight: 600;
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #1a0000;
            border: 2px solid #cc0000;
            color: #ffffff;
        }
        .correct {
            background: #1e4620 !important; 
            border-color: #4ade80 !important;
            color: #ffffff !important;
        }
        .incorrect {
            background: #5c1d1d !important;
            border-color: #f87171 !important;
            color: #ffffff !important;
        }
        footer {
            margin-top: 30px;
            padding-top: 15px;
            color: #ffffff;
            font-size: 1em;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-top: 1px solid #550000;
        }
    </style>
</head>
<body>

    <div class="card">
        
        <div id="start-screen">
            <h1>AI Math Game</h1>
            <p style="font-size: 18px; margin: 25px 0; color: #ffcccc; line-height: 1.6;">
                Welcome! Answer math problems in real-time by showing the correct number of fingers to your webcam.
            </p>
            <button type="button" style="font-size: 22px; padding: 15px 35px;" onclick="startGame()">Start Game 🎮</button>
            <footer style="margin-top: 40px;">A Collaborative Project by Maheendra, Issac, Biya, and Navya</footer>
        </div>

        <div id="game-screen" style="display: none;">
            <h1>Math Game</h1>
            
            <div class="question" id="math-question">Loading...</div>
            
            <button type="button" onclick="generateQuestion()">Next Question ➡️</button>

            <div id="camera-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
            </div>

            <div id="result-box">Waiting for camera...</div>

            <footer>A Collaborative Project by Maheendra, Issac, Biya, and Navya</footer>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script type="text/javascript">
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const resultBox = document.getElementById('result-box');

        let correctAnswer;
        let questionSolved = false;
        let cameraInitialized = false;
        let camera = null;

        // SAFE TIMING START FUNCTION
        function startGame() {
            // 1. Reveal the game arena layers first so they have real width/height values
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            // 2. Fire up the camera now that elements are fully visible
            if (!cameraInitialized) {
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 480,
                    height: 360
                });
                camera.start();
                cameraInitialized = true;
            }
            
            // 3. Generate the first math equation
            generateQuestion();
        }

        function generateQuestion() {
            let num1 = Math.floor(Math.random() * 6);
            let num2 = Math.floor(Math.random() * 6);
            let ops = ['+', '-', '*'];
            let op = ops[Math.floor(Math.random() * ops.length)];

            if (op === '+') correctAnswer = num1 + num2;
            else if (op === '-') correctAnswer = num1 - num2;
            else correctAnswer = num1 * num2;

            if (correctAnswer < 0 || correctAnswer > 10) return generateQuestion();

            let symbol = op === '*' ? '×' : op;
            document.getElementById("math-question").innerText = `What is ${num1} ${symbol} ${num2}?`;
            
            questionSolved = false; 
            resultBox.innerText = "Show your hand to the camera!";
            resultBox.className = ""; 
        }

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (questionSolved) {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    for (const lm of results.multiHandLandmarks) {
                        canvasCtx.fillStyle = '#ffffff';
                        lm.forEach(p => {
                            canvasCtx.beginPath();
                            canvasCtx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 5, 0, 2 * Math.PI);
                            canvasCtx.fill();
                        });
                    }
                }
                return; 
            }

            let count = 0;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const lm of results.multiHandLandmarks) {
                    canvasCtx.fillStyle = '#ffffff';
                    lm.forEach(p => {
                        canvasCtx.beginPath();
                        canvasCtx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 5, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    });

                    // Count fingers
                    if (lm[8].y < lm[6].y) count++;   
                    if (lm[12].y < lm[10].y) count++;  
                    if (lm[16].y < lm[14].y) count++;  
                    if (lm[20].y < lm[18].y) count++;  

                    const isLeft = results.multiHandedness[results.multiHandLandmarks.indexOf(lm)].label === 'Left';
                    if (isLeft ? lm[4].x > lm[2].x : lm[4].x < lm[2].x) count++; 
                }

                // Check the answer
                if (count === correctAnswer) {
                    resultBox.innerText = `CORRECT! You showed ${count}`;
                    resultBox.className = "correct";
                    questionSolved = true; 
                } else {
                    resultBox.innerText = `Scanning... You showed ${count}`;
                    resultBox.className = "incorrect";
                }
            } else {
                resultBox.innerText = "Show your hand clearly!";
                resultBox.className = "";
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);
    </script>
</body>
</html>
